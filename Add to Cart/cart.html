<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="Assets/css/card_style.css" rel="stylesheet">
    <link href="Assets/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="header">

        <p class="logo">
            <a href="./product.html">
                <img src="Assets/img/logo.png" alt="" width="150px">
            </a>
        </p>

        <div class="head">
            <p style="font-weight:600;">My Cart</p>
        </div>
    </div>

    <div class="container">
        <div class="row">

            <div class="addtocart">

                <div id="carditem" style="font-weight:700; text-align: center;" class="m-5">

                </div>
                <table class="table" border="1">
                    <tr class="data">
                        <th>ID</th>
                        <th>Name</th>
                        <th>Images</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Delete</th>
                    </tr>
                    <tbody id="carts"></tbody>
                </table>
                <div class="foot">
                    <h3>Total</h3>
                    <div id="total" style="font-weight:700;">
                        0.00
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="Assets/js/card.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>




</body>

</html>
